apiVersion: apps/v1
kind: Deployment
metadata:
  name: create-plugin
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: create-plugin
  template:
    metadata:
      labels:
        app: create-plugin
    spec:
      containers:
        - name: create-plugin
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8081
