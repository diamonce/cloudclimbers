apiVersion: apps/v1
kind: Deployment
metadata:
  name: create-plugin
  labels:
    app: create-plugin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: create-plugin
  template:
    metadata:
      labels:
        app: create-plugin
    spec:
      containers:
        - name: create-plugin
          image: {{ .Values.plugins.create.image }}
          ports:
            - containerPort: 8081
          volumeMounts:
            - name: gcp-service-account
              mountPath: /var/secrets/google
              readOnly: true
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/google/service-account-key.json
            - name: ENCRYPTION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gcpServiceAccount.secretName }}
                  key: encryptionPassword
      initContainers:
        - name: decrypt-service-account-key
          image: alpine
          command: ["sh", "-c", "apk add openssl && openssl enc -d -aes-256-cbc -in /var/secrets/google/service-account-key.json.enc -out /var/secrets/google/service-account-key.json -k $ENCRYPTION_PASSWORD"]
          volumeMounts:
            - name: gcp-service-account
              mountPath: /var/secrets/google
              readOnly: false
      volumes:
        - name: gcp-service-account
          secret:
            secretName: {{ .Values.gcpServiceAccount.secretName }}
