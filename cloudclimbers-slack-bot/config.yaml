slack_app_token: ""
slack_bot_token: ""
mongo_uri: "mongodb://mongodb:27017"  # Ensure this is correctly formatted
database_name: "cloudclimbers_db"

plugins:
  create:
    url: "http://create-plugin:8081/create"
    buttons:
      - text: "Create Environment"
        action_id: "create_environment"
        emoji: ":hammer_and_wrench:"  # Emoji for creating an environment
    commands: |
      # Check variables
      if [ -z "${NAMESPACE}" ] || [ -z "${DEPLOYMENT_NAME}" ] || [ -z "${REPO_NAME}" ] || [ -z "${SERVICE_PORT}" ] || [ -z "${REVISION}" ] || [ -z "${ARGOCD_PASSWORD}" ]; then
        echo "Error: One or more required variables are not set."
        exit 1
      fi

      # Create namespace
      kubectl create namespace ${NAMESPACE} || { echo "Failed to create namespace"; exit 1; }

      # Make port-forward для ArgoCD
      kubectl port-forward service/argocd-service-server -n argocd 8080:443 &
      sleep 3

      # Connect to ArgoCD
      argocd login --insecure --grpc-web localhost:8080 --username admin --password ${ARGOCD_PASSWORD} || { echo "Failed to login to ArgoCD"; exit 1; }

      # Create app with ArgoCD
      argocd app create ${DEPLOYMENT_NAME} \
        --repo ${REPO_NAME} \
        --path ${HELM_PATH} \
        --dest-server https://kubernetes.default.svc \
        --dest-namespace ${NAMESPACE} \
        --helm-set-string service.port=${SERVICE_PORT} \
        --revision "${REVISION}" || { echo "Failed to create ArgoCD application"; exit 1; }

      # Check app status
      argocd app wait ${DEPLOYMENT_NAME} --health --timeout 600 || { echo "Application did not become healthy"; exit 1; }
    variables:
      NAMESPACE: ""
      DEPLOYMENT_NAME: ""
      REPO_NAME: ""
      SERVICE_PORT: ""
      REVISION: ""
      ARGOCD_PASSWORD: ""
    hash:
      type: "SHA-256"
      value: "" # Will be calculated
  get:
    url: "http://get-plugin:8082/get"
    buttons:
      - text: "Get Environment Status"
        action_id: "get_environment_status"
        emoji: ":mag:"  # Emoji for getting status
    commands: |
      # Check variables
      if [ -z "${NAMESPACE}" ] || [ -z "${DEPLOYMENT_NAME}" ] ; then
        echo "Error: One or more required variables are not set."
        exit 1
      fi    
      kubectl get pods -n ${NAMESPACE} -o wide
      kubectl describe pods -n ${NAMESPACE}
      kubectl get all -n ${NAMESPACE}
      kubectl get deployment ${DEPLOYMENT_NAME} -n ${NAMESPACE}
      kubectl describe deployment ${DEPLOYMENT_NAME} -n ${NAMESPACE}
      kubectl get events -n ${NAMESPACE}
    variables:
      NAMESPACE: "value1"
      DEPLOYMENT_NAME: "value2"
    hash:
      type: "SHA-256"
      value: "" # Will be calculated
  delete:
    url: "http://delete-plugin:8083/delete"
    buttons:
      - text: "Delete Environment"
        action_id: "delete_environment"
        emoji: ":wastebasket:"  # Emoji for deleting an environment

main_buttons:
  - text: "List Enabled Plugins"
    action_id: "list_enabled_plugins"
    emoji: ":rocket:"  # Existing emoji for listing plugins
  - text: "Help"
    action_id: "help"
    emoji: ":information_source:"  # Existing emoji for help
