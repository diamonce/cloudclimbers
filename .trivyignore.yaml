misconfigurations:
  # Flux system ClusterRoles require broad RBAC permissions by design.
  # gotk-components.yaml is managed by Flux and cannot be modified without breaking the controller.
  - id: KSV-0041
    paths:
      - "flux/clusters/*/flux-system/gotk-components.yaml"
  - id: KSV-0046
    paths:
      - "flux/clusters/*/flux-system/gotk-components.yaml"

  # GKE master authorized networks is set to 0.0.0.0/0 to allow access from CI runners and
  # dynamic IPs. The control plane still requires GKE authentication and RBAC authorization.
  # Restrict this CIDR when static egress IPs are available.
  - id: GCP-0053
    paths:
      - "terraform/main.tf"
