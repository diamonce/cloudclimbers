name: ☁ 🏔️ Build and Push Docker Containers to GHCR

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - 'main'

jobs:
  deploy:
    permissions:
      contents: 'read'
      id-token: 'write'
      packages: 'write'
      security-events: 'write'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Branch
        uses: actions/checkout@v4.2.2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: Verify Go version
        run: go version

      - name: Update Go dependencies
        run: |
          cd cloudclimbers-slack-bot && go get golang.org/x/crypto@v0.35.0

      - name: Run vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd cloudclimbers-slack-bot && govulncheck ./...

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy --version

      - name: Scan repository dependencies (Trivy - SARIF)
        run: |
          trivy fs . \
            --scanners vuln,secret,misconfig \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --ignorefile .trivyignore.yaml \
            --format sarif \
            --output trivy-fs-results.sarif

      - name: Upload Trivy filesystem scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-fs'

      - name: Fail build on CRITICAL/HIGH findings (Trivy)
        run: |
          trivy fs . \
            --scanners vuln,secret,misconfig \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignorefile .trivyignore.yaml \
            --format table

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: make docker-push-ghcr

      - name: Build Docker Images (PR)
        if: github.event_name == 'pull_request'
        run: make docker-build-ghcr
